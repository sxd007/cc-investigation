<title>证据链可视化 — 调查底稿</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-deep:#0f1923;--bg-panel:#162030;--bg-card:#1d2d3f;--bg-hover:#243548;
  --border:#2a3f56;--border-lit:#3a5570;
  --text-primary:#d8e6f0;--text-secondary:#7a9bb5;--text-dim:#4a6880;--text-id:#4ecdc4;
  --amber:#e8a020;--amber-dim:#7a520f;--teal:#4ecdc4;--teal-dim:#1a4f4c;
  --green:#52c97a;--red:#e85c5c;--purple:#9b7ae8;
  --c-evidence:#7a9bb5;--c-clue:#4ecdc4;--c-argument:#9b7ae8;--c-finding:#e8a020;
  --c-entity:#5a8aaa;--c-hypothesis:#c89050;--c-event:#7aaa5a;
  --radius:6px;--radius-lg:10px;
  --font-mono:'SF Mono','Fira Code','Cascadia Code',monospace;
  --font-body:'Inter',system-ui,-apple-system,sans-serif
}
body{background:var(--bg-deep);color:var(--text-primary);font-family:var(--font-body);font-size:14px;line-height:1.6;min-height:100vh}
.app{display:flex;flex-direction:column;height:100vh}
.topbar{background:var(--bg-panel);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;flex-shrink:0;gap:12px}
.case-badge{background:var(--amber-dim);border:1px solid var(--amber);color:var(--amber);font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;padding:3px 10px;border-radius:3px;font-weight:600;flex-shrink:0}
.case-title{font-size:15px;font-weight:600}
.case-subtitle{font-size:12px;color:var(--text-secondary)}
.topbar-stats{display:flex;gap:8px;font-size:11px;color:var(--text-dim);margin-left:auto;flex-shrink:0}
.stat-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:2px}
.dot-ready{background:var(--green);box-shadow:0 0 4px var(--green)}
.dot-draft{background:var(--amber);box-shadow:0 0 4px var(--amber)}
.dot-superseded{background:var(--text-dim)}
.workspace{flex:1;overflow:hidden;display:flex}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-lit);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#4a6880}

/* ── XMind 左→右逻辑图 ─────────────────────────────────── */
.xmind-wrap{flex:1;overflow:auto;display:flex;flex-direction:column}
.xmind-toolbar{padding:6px 0;flex-shrink:0}
.xmind-content{flex:1;position:relative}
.xmind-card{position:absolute;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:5px 10px;cursor:pointer;transition:all .12s;display:flex;flex-direction:column;gap:1px;overflow:hidden}
.xmind-card:hover{background:var(--bg-hover);border-color:var(--border-lit);z-index:2}
.xmind-card .x-top{display:flex;align-items:center;gap:6px}
.xmind-card .x-id{font-family:var(--font-mono);font-size:10px;color:var(--text-id);flex-shrink:0}
.xmind-card .x-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-left:auto;border:1px solid rgba(0,0,0,.3)}
.xmind-card .x-title{font-size:11px;line-height:1.35;overflow:hidden;text-overflow:ellipsis;word-break:break-all;color:var(--text-secondary);min-width:0}
.xmind-card-l1{min-width:150px;border-left:3px solid var(--c-finding);z-index:1}
.xmind-card-l1 .x-title{font-weight:600;color:var(--text-primary);font-size:12px;max-height:33px}
.xmind-card-l2{min-width:130px;border-left:3px solid var(--c-argument)}
.xmind-card-l2 .x-title{max-height:30px}
.xmind-card-l3{min-width:110px;border-left:3px solid var(--c-clue)}
.xmind-card-l3 .x-title{max-height:30px}
.xmind-card-l4{min-width:90px;padding:4px 8px;border-left:3px solid var(--c-evidence)}
.xmind-card-l4 .x-title{font-size:10px;max-height:27px}

/* ── 折叠按钮 ────────────────────────────────────────── */
.x-collapse-btn{position:absolute;border:none;background:var(--bg-deep);border:1px solid var(--border);color:var(--text-id);font-size:10px;cursor:pointer;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:3;line-height:1;padding:0;transition:all .12s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.x-collapse-btn:hover{background:var(--teal-dim);border-color:var(--teal);color:var(--teal)}

/* ── 详情面板 ────────────────────────────────────────── */
.detail-panel{flex:0 0 30%;background:var(--bg-panel);border-left:1px solid var(--border);overflow-y:auto;display:none;flex-direction:column}
.detail-panel.open{display:flex}
.panel-header{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-id{font-family:var(--font-mono);font-size:11px;font-weight:700;flex-shrink:0}
.panel-title{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.panel-close{background:none;border:none;color:var(--text-dim);font-size:16px;cursor:pointer;padding:1px 6px;border-radius:var(--radius);flex-shrink:0}
.panel-close:hover{color:var(--text-primary);background:var(--bg-hover)}
.panel-body{padding:14px;font-size:13px;line-height:1.7;overflow-y:auto;flex:1}
.panel-body h3{font-size:14px;color:var(--text-primary);margin:12px 0 6px}
.panel-body h4{font-size:13px;color:var(--text-primary);margin:8px 0 4px}
.panel-body p{margin:6px 0;color:var(--text-secondary)}
.panel-body ul{padding-left:18px;margin:4px 0}
.panel-body li{margin:2px 0;color:var(--text-secondary)}
.panel-body code{background:var(--bg-card);padding:1px 4px;border-radius:3px;font-size:12px;color:var(--teal)}
.panel-body strong{color:var(--text-primary)}
.panel-body .panel-meta{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.panel-body .panel-meta-item{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:6px 8px}
.panel-body .panel-meta-label{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-dim);margin-bottom:1px}
.panel-body .panel-meta-value{font-size:12px}
.panel-body .panel-source{display:flex;align-items:center;gap:5px;padding:4px 8px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;margin:3px 0;font-size:11px;transition:background .15s}
.panel-body .panel-source:hover{background:var(--bg-hover)}
.panel-body .panel-source-id{font-family:var(--font-mono);font-size:10px;color:var(--text-id);flex-shrink:0}
.panel-body .panel-source-excerpt{color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.btn-sm{background:var(--bg-deep);border:1px solid var(--border);color:var(--text-dim);font-size:11px;padding:3px 10px;border-radius:var(--radius);cursor:pointer;font-family:var(--font-body);transition:all .12s;white-space:nowrap}
.btn-sm:hover{border-color:var(--teal);color:var(--teal)}
</style>

function mdToHtml(t){
  if(!t)return'';
  let h=esc(t);

  // 1. 保护代码块（先提取，避免被后续规则污染）
  const blocks=[];
  h=h.replace(/```(\w*)\n?([\s\S]*?)```/g,(m,lang,code)=>{
    const idx=blocks.length;
    blocks.push('<pre><code>'+esc(code.replace(/^<br>/,'').trim())+'</code></pre>');
    return '```CODE_BLOCK_'+idx+'```'
  });

  // 2. 表格（| col | col | 格式）
  h=h.replace(/^\|(.+)\|\n\|[-| :]+\|\n((?:\|.+\|\n?)+)/gm,(m,header,body)=>{
    let tbl='<table style="border-collapse:collapse;width:100%;margin:6px 0">';
    tbl+='<thead><tr>';
    header.split('|').forEach(c=>{const s=c.trim();if(s)tbl+='<th style="border:1px solid var(--border);padding:3px 6px;text-align:left;font-size:12px">'+s+'</th>'});
    tbl+='</tr></thead><tbody>';
    body.split('\n').forEach(row=>{
      const cells=row.split('|').filter(Boolean);
      if(cells.length>1){
        tbl+='<tr>';
        cells.forEach(c=>{const s=c.trim();if(s)tbl+='<td style="border:1px solid var(--border);padding:3px 6px;font-size:12px;color:var(--text-secondary)">'+s+'</td>'});
        tbl+='</tr>'
      }
    });
    tbl+='</tbody></table>';
    return tbl
  });

  // 3. 标题
  h=h.replace(/^#### (.+)$/gm,'<h4>$1</h4>');
  h=h.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  h=h.replace(/^## (.+)$/gm,'<h3>$1</h3>');
  h=h.replace(/^# (.+)$/gm,'<h2>$1</h2>');

  // 4. 行内格式
  h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');
  h=h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h=h.replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank" style="color:var(--teal)">$1</a>');

  // 5. 列表
  h=h.replace(/^- (.+)$/gm,'<li>$1</li>');
  h=h.replace(/^(\d+)\. (.+)$/gm,'<li>$2</li>');
  h=h.replace(/((?:<li>.*<\/li>\n?)+)/g,'<ul>$1</ul>');

  // 6. 分割线
  h=h.replace(/---+/g,'<hr style="border-color:var(--border);margin:8px 0">');

  // 7. 段落包装（跳过已经是块级的内容）
  const blockTags='h[2-4]|pre|table|ul|hr';
  const parts=h.split(/\n\n+/);
  if(parts.length>1){
    h=parts.map(p=>{
      const t=p.trim();
      if(!t)return'';
      if(new RegExp('^<('+blockTags+')').test(t))return t;
      return'<p>'+t.replace(/\n/g,'<br>')+'</p>'
    }).join('')
  }else{
    const t=h.trim();
    if(!new RegExp('^<('+blockTags+')').test(t))
      h='<p>'+t.replace(/\n/g,'<br>')+'</p>'
  }

  // 8. 恢复代码块
  h=h.replace(/```CODE_BLOCK_(\d+)```/g,(m,i)=>blocks[i]||m);
  return h
}

    b+='<h4>证据信息</h4>';
    if(n.source)b+=`<p>来源: ${esc(n.source)}</p>`;
    if(n.collected_at)b+=`<p>收集: ${n.collected_at}</p>`;
    if(n.collected_by)b+=`<p>收集人: ${n.collected_by}</p>`;
  }

  if(n.body&&n.body!=='---'&&n.body!=='')b+=mdToHtml(n.body);
  else if(n.assertion)b+=`<p style="color:var(--teal);font-style:italic">${esc(n.assertion)}</p>`;
  else b+=`<p style="color:var(--text-dim)">（无详细内容）</p>`;

  if(n.sources&&n.sources.length){
    b+='<h4>来源节点</h4>';
    for(const s of n.sources){
      const sc=NODES_DATA[s.id];const tc=typeColor(sc?sc.type:'EV');
      b+=`<div class="panel-source" onclick="showDetailPanel('${s.id}')"><span class="panel-source-id" style="color:${tc.fill}">${s.id}</span><span class="panel-source-excerpt">${s.excerpt?esc(s.excerpt):'—'}</span></div>`
    }
  }

  const refBy=Object.values(NODES_DATA).filter(x=>x.sources&&x.sources.some(s=>s.id===nid));
  if(refBy.length){
    b+='<h4>被引用为来源</h4>';
    for(const r of refBy){const rc=typeColor(r.type);
      b+=`<div class="panel-source" onclick="showDetailPanel('${r.id}')"><span class="panel-source-id" style="color:${rc.fill}">${r.id}</span><span class="panel-source-excerpt">${esc(r.title)}</span></div>`
    }
  }

  pbody.innerHTML=b;
  panel.classList.add('open')
}
function closeDetailPanel(){$('detail-panel').classList.remove('open')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetailPanel()});

// ═══════════════════════════════════════════════════════════════
// XMind 左→右逻辑图
// ═══════════════════════════════════════════════════════════════
const XMIND={slotH:74,colW:[160,180,160,140],gap:48,topPad:24,chainGap:28};

function xCountLeaves(chain){
  if(collapsedNodes.has(chain.id))return 1;
  if(!chain.children||!chain.children.length)return 1;
  return chain.children.reduce((s,c)=>s+xCountLeaves(c),0)
}

function xLayoutSubtree(chain,startY,level,xPos){
  const n=NODES_DATA[chain.id];
  if(!n)return null;
  const leaves=xCountLeaves(chain);
  const h=leaves*XMIND.slotH;
  const w=XMIND.colW[Math.min(level,XMIND.colW.length-1)];
  const cardH=level===0?60:level===1?56:level===2?56:52;
  const midY=startY+h/2;
  const hasChildren=chain.children&&chain.children.length>0;
  const isCollapsed=collapsedNodes.has(chain.id);
  const result={id:chain.id,node:n,level,x:xPos,y:midY-cardH/2,w,h:cardH,children:[],subLeaves:leaves,hasChildren,isCollapsed};
  let childY=startY;
  if(hasChildren&&!isCollapsed){
    const childX=xPos+w+XMIND.gap;
    for(const c of chain.children){
      const cl=xLayoutSubtree(c,childY,level+1,childX);
      if(cl){result.children.push(cl);childY+=cl.subLeaves*XMIND.slotH}
    }
  }
  return result
}

function xBuildLayout(){
  if(!CHAINS_DATA.length)return[];
  let y=XMIND.topPad;
  const roots=[];
  for(const ch of CHAINS_DATA){
    const root=xLayoutSubtree(ch,y,0,XMIND.topPad);
    if(root){roots.push(root);y+=root.subLeaves*XMIND.slotH+XMIND.chainGap}
  }
  return roots
}

function xCollectEdges(layout,edges){
  for(const c of layout.children){
    edges.push({x1:layout.x+layout.w,y1:layout.y+layout.h/2,x2:c.x,y2:c.y+c.h/2,from:layout.id,to:c.id});
    xCollectEdges(c,edges)
  }
}

function xDimension(roots){
  let maxX=0,maxY=0;
  function walk(n){maxX=Math.max(maxX,n.x+n.w);maxY=Math.max(maxY,n.y+n.h);n.children.forEach(walk)}
  roots.forEach(walk);
  return{w:maxX+60,h:maxY+40}
}

function renderXMind(){
  const roots=xBuildLayout();
  const container=$('xmind-content');
  if(!roots.length){container.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-dim);gap:8px;padding:40px"><div style="font-size:36px;opacity:.4">📋</div><div style="font-size:13px">无证据链数据</div></div>';return}

  const edges=[];
  roots.forEach(r=>xCollectEdges(r,edges));
  const dim=xDimension(roots);

  // SVG 连线 + 卡片 — 放在同一层，共享坐标原点
  let svgHtml='<svg style="position:absolute;top:0;left:0;pointer-events:none" width="'+dim.w+'" height="'+dim.h+'">';
  for(const e of edges){
    const mx=(e.x1+e.x2)/2,my=(e.y1+e.y2)/2;
    svgHtml+=`<path d="M${e.x1},${e.y1} L${mx},${e.y1} L${mx},${e.y2} L${e.x2},${e.y2}" fill="none" stroke="#2a3f56" stroke-width="1.5" stroke-linejoin="round"/>`;
    const edgeData=EDGES_DATA.find(ed=>ed.from===e.from&&ed.to===e.to);
    if(edgeData&&edgeData.excerpt){
      svgHtml+=`<text x="${mx}" y="${my-4}" text-anchor="middle" fill="#4a6880" font-size="9">${esc(edgeData.excerpt.slice(0,18))}</text>`
    }
  }
  svgHtml+='</svg>';

  const cards=[];
  function collect(n){cards.push(n);n.children.forEach(collect)}
  roots.forEach(collect);

  const typeLevel=m=>{if(m.level===0)return'xmind-card-l1';if(m.level===1)return'xmind-card-l2';if(m.level===2)return'xmind-card-l3';return'xmind-card-l4'};

  let cardsHtml='';
  for(const c of cards){
    const fullTitle=c.node.title||'';
    cardsHtml+=`<div class="xmind-card ${typeLevel(c)}" style="left:${c.x}px;top:${c.y}px;width:${c.w}px;height:${c.h}px" data-id="${c.id}" title="${esc(fullTitle)}">
      <div class="x-top">
        <span class="x-id">${c.id}</span>
        <span class="x-dot" style="background:${c.node.status==='ready'?'#52c97a':c.node.status==='draft'?'#e8a020':'#4a6880'}"></span>
      </div>
      <span class="x-title">${esc(fullTitle)}</span>
    </div>`
  }

  // 折叠按钮（画在连接线起始处）
  let btnHtml='';
  function collectBtns(n){
    if(n.hasChildren){
      const icon=n.isCollapsed?'+':'−';
      btnHtml+=`<button class="x-collapse-btn" style="left:${n.x+n.w+4}px;top:${n.y+n.h/2-8}px" data-toggle="${n.id}">${icon}</button>`
    }
    n.children.forEach(collectBtns)
  }
  roots.forEach(collectBtns);

  container.innerHTML='<div style="position:relative;width:'+dim.w+'px;height:'+dim.h+'px">'+svgHtml+btnHtml+cardsHtml+'</div>';
  $('btn-collapse-all').textContent=collapsedNodes.size?'⊞ 全部':'⊟ 全部';
}

// XMind 交互
$('xmind-content').addEventListener('click',e=>{
  const btn=e.target.closest('.x-collapse-btn');
  if(btn){
    const id=btn.dataset.toggle;
    if(collapsedNodes.has(id))collapsedNodes.delete(id);else collapsedNodes.add(id);
    renderXMind();return
  }
  const card=e.target.closest('.xmind-card');
  if(card)showDetailPanel(card.dataset.id)
});

// ═══════════════════════════════════════════════════════════════
// Resize
// ═══════════════════════════════════════════════════════════════
let rt;
window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>renderXMind(),200)});

// ═══════════════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════════════
renderXMind();
</script>
