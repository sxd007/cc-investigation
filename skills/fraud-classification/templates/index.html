<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fraud Tree Editor</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#3b82f6',
            secondary: '#64748b',
            success: '#10b981',
            warning: '#f59e0b',
            danger: '#ef4444',
            dark: '#1e293b',
            light: '#f8fafc'
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
      .tree-node {
        @apply border-l-2 border-gray-200 pl-4 py-1;
      }
      .tree-node-last {
        @apply border-l-2 border-gray-200 border-t-2 border-r-2 rounded-tr-md pl-4 py-1;
      }
      .edit-form {
        @apply bg-white rounded-lg shadow-md p-4 mb-4;
      }
      .form-group {
        @apply mb-3;
      }
      .form-label {
        @apply block text-sm font-medium text-gray-700 mb-1;
      }
      .form-input {
        @apply w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent;
      }
      .form-textarea {
        @apply w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent resize-y;
      }
      .btn {
        @apply px-4 py-2 rounded-md font-medium transition-colors;
      }
      .btn-primary {
        @apply bg-primary text-white hover:bg-primary/90;
      }
      .btn-secondary {
        @apply bg-secondary text-white hover:bg-secondary/90;
      }
      .btn-success {
        @apply bg-success text-white hover:bg-success/90;
      }
      .btn-danger {
        @apply bg-danger text-white hover:bg-danger/90;
      }
      .btn-outline {
        @apply border border-gray-300 text-gray-700 hover:bg-gray-50;
      }
      .badge {
        @apply px-2 py-1 text-xs font-medium rounded-full;
      }
      .badge-blue {
        @apply bg-blue-100 text-blue-800;
      }
      .badge-green {
        @apply bg-green-100 text-green-800;
      }
      .badge-yellow {
        @apply bg-yellow-100 text-yellow-800;
      }
      .badge-red {
        @apply bg-red-100 text-red-800;
      }
      .badge-purple {
        @apply bg-purple-100 text-purple-800;
      }
      .badge-gray {
        @apply bg-gray-100 text-gray-800;
      }
    }

    /* 深色主题样式 */
    .dark {
      @apply bg-gray-900 text-gray-200;
    }

    .dark .bg-white {
      @apply bg-gray-800;
    }

    .dark .text-gray-900 {
      @apply text-gray-100;
    }

    .dark .text-gray-700 {
      @apply text-gray-300;
    }

    .dark .text-gray-600 {
      @apply text-gray-400;
    }

    .dark .text-gray-500 {
      @apply text-gray-400;
    }

    .dark .border-gray-200 {
      @apply border-gray-700;
    }

    .dark .border-gray-300 {
      @apply border-gray-600;
    }

    .dark .bg-gray-100 {
      @apply bg-gray-700;
    }

    .dark .bg-gray-50 {
      @apply bg-gray-800;
    }

    .dark .hover:bg-gray-50 {
      @apply hover:bg-gray-700;
    }

    .dark .hover:bg-gray-100 {
      @apply hover:bg-gray-700;
    }

    .dark .form-label {
      @apply text-gray-300;
    }

    .dark .form-input {
      @apply bg-gray-700 border-gray-600 text-gray-200;
    }

    .dark .form-textarea {
      @apply bg-gray-700 border-gray-600 text-gray-200;
    }

    .dark .btn-outline {
      @apply border-gray-600 text-gray-300 hover:bg-gray-700;
    }

    .dark .badge-blue {
      @apply bg-blue-900 text-blue-200;
    }

    .dark .badge-green {
      @apply bg-green-900 text-green-200;
    }

    .dark .badge-yellow {
      @apply bg-yellow-900 text-yellow-200;
    }

    .dark .badge-red {
      @apply bg-red-900 text-red-200;
    }

    .dark .badge-purple {
      @apply bg-purple-900 text-purple-200;
    }

    .dark .badge-gray {
      @apply bg-gray-700 text-gray-300;
    }

    .dark .tree-node {
      @apply border-gray-700;
    }

    .dark .tree-node-last {
      @apply border-gray-700;
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="container mx-auto px-4 py-8">
    <!-- Header -->
    <header class="mb-8">
      <h1 class="text-3xl font-bold text-gray-900 flex items-center">
        <i class="fa fa-sitemap mr-3 text-primary"></i>
        ACFE Fraud Tree Editor
      </h1>
      <p class="text-gray-600 mt-2">交互式编辑欺诈分类树，可修改现有元素或添加新属性</p>
    </header>

    <!-- Main Content -->
    <div class="flex flex-col lg:flex-row gap-6">
      <!-- Tree View -->
      <div class="lg:w-3/4 bg-white rounded-lg shadow-md p-6">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-xl font-semibold text-gray-900">Fraud Tree 结构</h2>
          <div class="flex gap-2">
            <button id="save-btn" class="btn btn-success flex items-center">
              <i class="fa fa-save mr-2"></i> 保存更改
            </button>
            <button id="create-version-btn" class="btn btn-primary flex items-center">
              <i class="fa fa-tag mr-2"></i> 创建版本
            </button>
            <button id="version-history-btn" class="btn btn-outline flex items-center">
              <i class="fa fa-history mr-2"></i> 版本历史
            </button>
            <button id="tags-btn" class="btn btn-outline flex items-center">
              <i class="fa fa-tags mr-2"></i> 标签管理
            </button>
            <div class="relative">
              <button id="theme-toggle" class="btn btn-outline flex items-center">
                <i class="fa fa-moon-o mr-2"></i> 主题
              </button>
              <div id="theme-dropdown" class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg py-2 hidden">
                <button class="theme-option block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" data-theme="light">
                  <i class="fa fa-sun-o mr-2"></i> 浅色主题
                </button>
                <button class="theme-option block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" data-theme="dark">
                  <i class="fa fa-moon-o mr-2"></i> 深色主题
                </button>
                <button class="theme-option block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" data-theme="system">
                  <i class="fa fa-desktop mr-2"></i> 系统主题
                </button>
              </div>
            </div>
            <button id="expand-all-btn" class="btn btn-outline flex items-center">
              <i class="fa fa-plus-square mr-2"></i> 全部展开
            </button>
            <button id="collapse-all-btn" class="btn btn-outline flex items-center">
              <i class="fa fa-minus-square mr-2"></i> 全部折叠
            </button>
          </div>
        </div>
        <div id="tree-container" class="overflow-auto max-h-[800px]">
          <!-- Tree will be rendered here -->
        </div>
      </div>

      <!-- Edit Panel -->
      <div class="lg:w-1/4">
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
          <h2 id="edit-panel-title" class="text-xl font-semibold text-gray-900 mb-4">编辑面板</h2>
          <div id="edit-panel">
            <p class="text-gray-500 text-center py-8">选择一个节点开始编辑</p>
          </div>
        </div>

        <!-- Add New Property Panel -->
        <div id="add-property-panel-container" class="bg-white rounded-lg shadow-md p-6">
          <h2 class="text-xl font-semibold text-gray-900 mb-4">添加新属性</h2>
          <div id="add-property-panel">
            <p class="text-gray-500 text-center py-8">选择一个节点添加新属性</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Version History Modal -->
    <div id="version-history-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
      <div class="bg-white rounded-lg shadow-xl p-6 max-w-2xl w-full max-h-[80vh] overflow-auto">
        <div class="flex justify-between items-center mb-6">
          <h3 class="text-xl font-semibold text-gray-900">版本历史</h3>
          <button id="close-version-modal" class="text-gray-500 hover:text-gray-700">
            <i class="fa fa-times text-xl"></i>
          </button>
        </div>
        <div id="version-list" class="space-y-4">
          <!-- Version items will be rendered here -->
        </div>
      </div>
    </div>

    <!-- Create Version Modal -->
    <div id="create-version-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
      <div class="bg-white rounded-lg shadow-xl p-6 max-w-md w-full">
        <div class="flex justify-between items-center mb-6">
          <h3 class="text-xl font-semibold text-gray-900">创建新版本</h3>
          <button id="close-create-version-modal" class="text-gray-500 hover:text-gray-700">
            <i class="fa fa-times text-xl"></i>
          </button>
        </div>
        <form id="create-version-form">
          <div class="form-group">
            <label for="version-name" class="form-label">版本名称</label>
            <input type="text" id="version-name" name="version-name" placeholder="例如: v1.0" class="form-input" required>
          </div>
          <div class="form-group">
            <label for="version-description" class="form-label">版本描述</label>
            <textarea id="version-description" name="version-description" placeholder="描述此版本的更改" class="form-textarea" rows="3"></textarea>
          </div>
          <div class="flex gap-2 mt-6">
            <button type="submit" class="btn btn-primary flex-1">
              <i class="fa fa-save mr-2"></i> 保存版本
            </button>
            <button type="button" id="cancel-create-version" class="btn btn-outline">
              <i class="fa fa-times mr-2"></i> 取消
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Tags Management Modal -->
    <div id="tags-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
      <div class="bg-white rounded-lg shadow-xl p-6 max-w-2xl w-full max-h-[80vh] overflow-auto">
        <div class="flex justify-between items-center mb-6">
          <h3 class="text-xl font-semibold text-gray-900">标签管理</h3>
          <button id="close-tags-modal" class="text-gray-500 hover:text-gray-700">
            <i class="fa fa-times text-xl"></i>
          </button>
        </div>
        <div class="mb-6">
          <h4 class="font-medium text-gray-900 mb-3">添加新标签</h4>
          <form id="add-tag-form" class="flex gap-2">
            <input type="text" id="tag-name" name="tag-name" placeholder="标签名称" class="form-input flex-1" required>
            <input type="color" id="tag-color" name="tag-color" value="#3b82f6" class="w-12 h-10 rounded-md">
            <button type="submit" class="btn btn-primary">
              <i class="fa fa-plus mr-2"></i> 添加
            </button>
          </form>
        </div>
        <div>
          <h4 class="font-medium text-gray-900 mb-3">现有标签</h4>
          <div id="tags-list" class="space-y-3">
            <!-- Tags will be rendered here -->
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="mt-12 text-center text-gray-600 text-sm">
      <p>© 2026 Fraud Tree Editor | 基于 Occupational Fraud and Abuse Classification System</p>
    </footer>
  </div>

    // 渲染树结构
    function renderTree() {
      const treeContainer = document.getElementById('tree-container');
      treeContainer.innerHTML = '';
      
      const rootNode = fraudTreeData.fraud_tree;
      const rootElement = createTreeNode(rootNode, 'root', [], true);
      treeContainer.appendChild(rootElement);
    }

    // 创建树节点元素
    function createTreeNode(node, id, path, isRoot = false) {
      const nodeDiv = document.createElement('div');
      nodeDiv.className = 'mb-2';
      
      // 节点头部
      const nodeHeader = document.createElement('div');
      nodeHeader.className = 'flex items-center gap-2 py-1';
      
      // 展开/折叠按钮
      if (hasChildren(node)) {
        const toggleBtn = document.createElement('button');
        toggleBtn.className = 'text-gray-500 hover:text-primary focus:outline-none';
        toggleBtn.innerHTML = '<i class="fa fa-caret-down"></i>';
        toggleBtn.onclick = (e) => {
          e.stopPropagation();
          toggleNode(nodeHeader.nextElementSibling, toggleBtn);
        };
        nodeHeader.appendChild(toggleBtn);
      } else {
        const spacer = document.createElement('div');
        spacer.className = 'w-5';
        nodeHeader.appendChild(spacer);
      }
      
      // 节点名称（包含alias）
      const nodeName = document.createElement('div');
      nodeName.className = 'flex-1 font-medium text-gray-900 hover:text-primary cursor-pointer';
      
      // 拼接name和alias
      let displayName = node.name || node.id;
      if (node.alias) {
        displayName += ` | ${node.alias}`;
      }
      
      nodeName.textContent = displayName;
      nodeName.onclick = () => selectNode(node, path.concat(id));
      
      // 添加 hover 效果
      nodeName.addEventListener('mouseenter', () => {
        // 如果处于编辑模式，不执行hover逻辑
        if (!isEditing) {
          // 在右侧面板显示属性值
          showNodeProperties(node);
        }
      });
      
      // 当鼠标离开节点名称时
      nodeName.addEventListener('mouseleave', () => {
        // 不自动隐藏，保持显示状态
        // 只有当鼠标离开整个树或hover其他节点时才会改变
      });
      
      nodeHeader.appendChild(nodeName);
      
      // Case Percentage 圆环图
      if (node.case_percentage !== null && node.case_percentage !== undefined) {
        const percentage = Math.round(node.case_percentage * 100);
        const casePercentageDiv = document.createElement('div');
        casePercentageDiv.className = 'relative ml-2 flex-shrink-0';
        casePercentageDiv.title = `Case Percentage: ${percentage}%`;
        
        // 创建圆环图 SVG
        const svgSize = 36;
        const strokeWidth = 4;
        const radius = (svgSize - strokeWidth) / 2;
        const circumference = radius * 2 * Math.PI;
        const strokeDashoffset = circumference - (percentage / 100) * circumference;
        
        // 根据百分比设置颜色
        let strokeColor;
        if (percentage >= 75) {
          strokeColor = '#ef4444'; // 红色
        } else if (percentage >= 50) {
          strokeColor = '#f59e0b'; // 黄色
        } else if (percentage >= 25) {
          strokeColor = '#10b981'; // 绿色
        } else {
          strokeColor = '#3b82f6'; // 蓝色
        }
        
        casePercentageDiv.innerHTML = `
          <svg width="${svgSize}" height="${svgSize}" class="transform -rotate-90">
            <circle cx="${svgSize/2}" cy="${svgSize/2}" r="${radius}" stroke="#e5e7eb" stroke-width="${strokeWidth}" fill="none"/>
            <circle cx="${svgSize/2}" cy="${svgSize/2}" r="${radius}" stroke="${strokeColor}" stroke-width="${strokeWidth}" fill="none" stroke-dasharray="${circumference}" stroke-dashoffset="${circumference}" stroke-linecap="round" class="transition-all duration-1500 ease-out" style="stroke-dashoffset: ${strokeDashoffset};"/>
          </svg>
          <div class="absolute inset-0 flex items-center justify-center text-xs font-bold">${percentage}%</div>
        `;
        
        nodeHeader.appendChild(casePercentageDiv);
      }
      
      // Median Loss Usd 显示
      if (node.median_loss_usd !== null && node.median_loss_usd !== undefined) {
        const medianLossDiv = document.createElement('div');
        medianLossDiv.className = 'flex-shrink-0 ml-2';
        
        // 格式化金额
        let formattedAmount;
        if (node.median_loss_usd >= 1000000) {
          formattedAmount = `$${(node.median_loss_usd / 1000000).toFixed(1)}M`;
        } else if (node.median_loss_usd >= 1000) {
          formattedAmount = `$${(node.median_loss_usd / 1000).toFixed(0)}K`;
        } else {
          formattedAmount = `$${node.median_loss_usd}`;
        }
        
        // 根据损失金额设置颜色
        let lossColor;
        if (node.median_loss_usd >= 500000) {
          lossColor = '#ef4444'; // 红色
        } else if (node.median_loss_usd >= 100000) {
          lossColor = '#f59e0b'; // 黄色
        } else if (node.median_loss_usd >= 50000) {
          lossColor = '#10b981'; // 绿色
        } else {
          lossColor = '#3b82f6'; // 蓝色
        }
        
        medianLossDiv.innerHTML = `
          <div class="text-sm font-bold" style="color: ${lossColor};">${formattedAmount}</div>
          <div class="text-xs text-gray-500">Loss</div>
        `;
        medianLossDiv.title = `Median Loss: $${node.median_loss_usd.toLocaleString()}`;
        nodeHeader.appendChild(medianLossDiv);
      }
      
      // 如果节点有风险特征，添加风险等级指示器
      if (node.risk_characteristics && node.risk_characteristics.length > 0) {
        const riskLevel = Math.min(Math.ceil(node.risk_characteristics.length / 2), 5);
        const riskIndicatorDiv = document.createElement('div');
        riskIndicatorDiv.className = 'ml-2 flex-shrink-0';
        riskIndicatorDiv.title = `Risk Level: ${riskLevel}/5 (${node.risk_characteristics.length} risk factors)`;
        
        let riskColor;
        if (riskLevel >= 4) {
          riskColor = '#ef4444'; // 红色
        } else if (riskLevel >= 3) {
          riskColor = '#f59e0b'; // 黄色
        } else {
          riskColor = '#10b981'; // 绿色
        }
        
        riskIndicatorDiv.innerHTML = `
          <div class="flex items-center">
            <span class="text-xs font-medium mr-1">Risk:</span>
            <div class="flex">
              ${Array.from({ length: 5 }).map((_, i) => `
                <div class="w-2 h-2 rounded-full mx-0.5" style="background-color: ${i < riskLevel ? riskColor : '#e5e7eb'};"></div>
              `).join('')}
            </div>
          </div>
        `;
        
        nodeHeader.appendChild(riskIndicatorDiv);
      }
      
      // 节点类型徽章
      const nodeType = getNodeType(node);
      const badge = document.createElement('span');
      badge.className = `badge ${getBadgeClass(nodeType)} ml-2`;
      badge.textContent = nodeType;
      nodeHeader.appendChild(badge);
      
      // 编辑按钮
      const editBtn = document.createElement('button');
      editBtn.className = 'text-gray-500 hover:text-primary focus:outline-none ml-2';
      editBtn.innerHTML = '<i class="fa fa-pencil"></i>';
      editBtn.onclick = (e) => {
        e.stopPropagation();
        selectNode(node, path.concat(id));
      };
      nodeHeader.appendChild(editBtn);
      
      nodeDiv.appendChild(nodeHeader);
      
      // 子节点
      if (hasChildren(node)) {
        const childrenContainer = document.createElement('div');
        childrenContainer.className = 'ml-4 border-l-2 border-gray-200 pl-4';
        
        const children = getChildren(node);
        children.forEach((child, index) => {
          const childId = Object.keys(child)[0];
          const childNode = child[childId];
          const childPath = path.concat(id);
          
          const childElement = createTreeNode(childNode, childId, childPath);
          childrenContainer.appendChild(childElement);
        });
        
        nodeDiv.appendChild(childrenContainer);
      }
      
      return nodeDiv;
    }

    // 切换节点展开/折叠状态
    function toggleNode(childrenContainer, toggleBtn) {
      if (childrenContainer.style.display === 'none') {
        childrenContainer.style.display = 'block';
        toggleBtn.innerHTML = '<i class="fa fa-caret-down"></i>';
      } else {
        childrenContainer.style.display = 'none';
        toggleBtn.innerHTML = '<i class="fa fa-caret-right"></i>';
      }
    }

    // 检查节点是否有子节点
    function hasChildren(node) {
      console.log('检查节点是否有子节点:', node.name, {
        categories: node.categories ? node.categories.length : 0,
        subcategories: node.subcategories ? node.subcategories.length : 0,
        schemes: node.schemes ? node.schemes.length : 0,
        sub_schemes: node.sub_schemes ? node.sub_schemes.length : 0,
        methods: node.methods ? node.methods.length : 0,
        techniques: node.techniques ? node.techniques.length : 0
      });
      
      const result = (
        node.categories && node.categories.length > 0 ||
        node.subcategories && node.subcategories.length > 0 ||
        node.schemes && node.schemes.length > 0 ||
        node.sub_schemes && node.sub_schemes.length > 0 ||
        node.methods && node.methods.length > 0 ||
        node.techniques && node.techniques.length > 0
      );
      
      console.log('hasChildren结果:', result);
      return result;
    }

    // 获取节点的子节点
    function getChildren(node) {
      console.log('获取节点的子节点:', node.name);
      const children = [];
      
      if (node.categories && node.categories.length > 0) {
        console.log('发现categories:', node.categories.length);
        node.categories.forEach(category => {
          children.push({ [category.id]: category });
        });
      }
      
      if (node.subcategories && node.subcategories.length > 0) {
        console.log('发现subcategories:', node.subcategories.length);
        node.subcategories.forEach(subcategory => {
          children.push({ [subcategory.id]: subcategory });
        });
      }
      
      if (node.schemes && node.schemes.length > 0) {
        console.log('发现schemes:', node.schemes.length);
        node.schemes.forEach(scheme => {
          children.push({ [scheme.id]: scheme });
        });
      }
      
      if (node.sub_schemes && node.sub_schemes.length > 0) {
        console.log('发现sub_schemes:', node.sub_schemes.length);
        node.sub_schemes.forEach(subScheme => {
          children.push({ [subScheme.id]: subScheme });
        });
      }
      
      if (node.methods && node.methods.length > 0) {
        console.log('发现methods:', node.methods.length);
        node.methods.forEach(method => {
          children.push({ [method.name || method.id]: method });
        });
      }
      
      if (node.techniques && node.techniques.length > 0) {
        console.log('发现techniques:', node.techniques.length);
        node.techniques.forEach(technique => {
          children.push({ [technique.name || technique.id]: technique });
        });
      }
      
      console.log('子节点总数:', children.length);
      return children;
    }

    // 获取节点类型
    function getNodeType(node) {
      if (node.subcategories) return 'Category';
      if (node.schemes) return 'Subcategory';
      if (node.sub_schemes) return 'Scheme';
      if (node.methods) return 'Sub-scheme';
      if (node.techniques) return 'Method';
      return 'Technique';
    }

    // 获取徽章类名
    function getBadgeClass(type) {
      const classMap = {
        'Category': 'badge-blue',
        'Subcategory': 'badge-green',
        'Scheme': 'badge-yellow',
        'Sub-scheme': 'badge-red',
        'Method': 'badge-purple',
        'Technique': 'badge-gray'
      };
      return classMap[type] || 'badge-gray';
    }

    // 保存节点更改
    function saveNodeChanges() {
      const form = document.getElementById('edit-form');
      const formData = new FormData(form);
      
      // 处理数组类型的属性
      const arrayProperties = ['risk_characteristics', 'business_data_domains'];
      arrayProperties.forEach(key => {
        const arrayValues = [];
        let index = 0;
        
        // 收集所有数组项的值
        while (true) {
          const value = formData.get(`${key}[${index}]`);
          if (value !== null) {
            arrayValues.push(value);
            index++;
          } else {
            break;
          }
        }
        
        // 如果有值，更新节点属性
        if (arrayValues.length > 0) {
          currentNode[key] = arrayValues;
        } else {
          // 如果没有值，删除该属性
          delete currentNode[key];
        }
      });
      
      // 处理非数组类型的属性
      for (const [key, value] of formData.entries()) {
        // 跳过数组类型的属性（已经处理过）
        if (arrayProperties.some(prop => key.startsWith(`${prop}[`))) {
          continue;
        }
        
        // 转换类型
        const originalValue = currentNode[key];
        if (typeof originalValue === 'number') {
          currentNode[key] = parseFloat(value) || null;
        } else if (typeof originalValue === 'boolean') {
          currentNode[key] = value === 'on';
        } else if (value === '') {
          currentNode[key] = null;
        } else {
          currentNode[key] = value;
        }
      }
      
      // 重新渲染树
      renderTree();
      
      // 显示成功消息
      showMessage('更改已保存', 'success');
      
      // 保持编辑模式，用户可能需要继续编辑其他属性
      // isEditing 保持为 true
    }

    // 添加新属性
    function addNewProperty() {
      const form = document.getElementById('add-property-form');
      const formData = new FormData(form);
      
      const propertyName = formData.get('property-name');
      let propertyValue = formData.get('property-value');
      const propertyType = formData.get('property-type');
      
      // 转换类型
      switch (propertyType) {
        case 'number':
          propertyValue = parseFloat(propertyValue) || 0;
          break;
        case 'boolean':
          propertyValue = propertyValue === 'true' || propertyValue === '1';
          break;
        case 'array':
          if (propertyValue.trim() === '') {
            propertyValue = [];
          } else {
            propertyValue = propertyValue.split(',').map(item => item.trim()).filter(item => item !== '');
          }
          break;
      }
      
      // 添加新属性
      currentNode[propertyName] = propertyValue;
      
      // 更新编辑面板
      updateEditPanel();
      
      // 显示成功消息
      showMessage('属性已添加', 'success');
    }

    // 保存整个树
    function saveTree() {
      try {
        // 转换为 JSON 字符串
        const jsonString = JSON.stringify(fraudTreeData, null, 2);
        
        // 创建下载链接
        const blob = new Blob([jsonString], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'fraud_tree_updated.json';
        a.click();
        
        // 释放 URL 对象
        URL.revokeObjectURL(url);
        
        // 显示成功消息
        showMessage('Fraud Tree 已保存', 'success');
      } catch (error) {
        console.error('保存失败:', error);
        showMessage('保存失败，请重试', 'error');
      }
    }

    // 显示消息
    function showMessage(message, type = 'info') {
      // 创建消息元素
      const messageDiv = document.createElement('div');
      messageDiv.className = `fixed top-4 right-4 px-4 py-2 rounded-md shadow-lg ${getAlertClass(type)}`;
      messageDiv.textContent = message;
      
      // 添加到页面
      document.body.appendChild(messageDiv);
      
      // 3秒后移除
      setTimeout(() => {
        messageDiv.style.opacity = '0';
        messageDiv.style.transition = 'opacity 0.5s ease';
        setTimeout(() => {
          document.body.removeChild(messageDiv);
        }, 500);
      }, 3000);
    }

    // 获取警报类名
    function getAlertClass(type) {
      const classMap = {
        'success': 'bg-green-500 text-white',
        'error': 'bg-red-500 text-white',
        'info': 'bg-blue-500 text-white',
        'warning': 'bg-yellow-500 text-white'
      };
      return classMap[type] || 'bg-blue-500 text-white';
    }

    // 格式化键名
    function formatKey(key) {
      return key.split('_').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
    }

    // 转义 HTML
    function escapeHTML(str) {
      return str.replace(/[&<>'"]/g, function(match) {
        const escapeMap = {
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          "'": '&#39;',
          '"': '&quot;'
        };
        return escapeMap[match];
      });
    }

    // 全部展开
    function expandAll() {
      const toggleButtons = document.querySelectorAll('.fa-caret-right');
      toggleButtons.forEach(btn => {
        btn.click();
      });
    }

    // 全部折叠
    function collapseAll() {
      const toggleButtons = document.querySelectorAll('.fa-caret-down');
      toggleButtons.forEach(btn => {
        btn.click();
      });
    }

    // 绑定事件
    function bindEvents() {
      // 保存按钮
      document.getElementById('save-btn').onclick = saveTree;
      
      // 全部展开按钮
      document.getElementById('expand-all-btn').onclick = expandAll;
      
      // 全部折叠按钮
      document.getElementById('collapse-all-btn').onclick = collapseAll;
      
      // 版本控制按钮
      document.getElementById('create-version-btn').onclick = () => {
        document.getElementById('create-version-modal').classList.remove('hidden');
      };
      
      document.getElementById('version-history-btn').onclick = showVersionHistory;
      
      // 版本模态框关闭按钮
      document.getElementById('close-version-modal').onclick = () => {
        document.getElementById('version-history-modal').classList.add('hidden');
      };
      
      document.getElementById('close-create-version-modal').onclick = () => {
        document.getElementById('create-version-modal').classList.add('hidden');
      };
      
      document.getElementById('cancel-create-version').onclick = () => {
        document.getElementById('create-version-modal').classList.add('hidden');
      };
      
      // 创建版本表单提交
      document.getElementById('create-version-form').onsubmit = (e) => {
        e.preventDefault();
        createVersion();
      };
      
      // 标签管理按钮
      document.getElementById('tags-btn').onclick = showTagsManagement;
      
      // 标签模态框关闭按钮
      document.getElementById('close-tags-modal').onclick = () => {
        document.getElementById('tags-modal').classList.add('hidden');
      };
      
      // 添加标签表单提交
      document.getElementById('add-tag-form').onsubmit = (e) => {
        e.preventDefault();
        addTag();
      };
      
      // 主题切换按钮
      const themeToggle = document.getElementById('theme-toggle');
      const themeDropdown = document.getElementById('theme-dropdown');
      
      themeToggle.addEventListener('click', (e) => {
        e.stopPropagation();
        themeDropdown.classList.toggle('hidden');
      });
      
      // 点击其他地方关闭主题下拉菜单
      document.addEventListener('click', (e) => {
        if (!themeToggle.contains(e.target) && !themeDropdown.contains(e.target)) {
          themeDropdown.classList.add('hidden');
        }
      });
      
      // 主题选项点击事件
      document.querySelectorAll('.theme-option').forEach(option => {
        option.addEventListener('click', (e) => {
          const theme = e.target.closest('.theme-option').getAttribute('data-theme');
          setTheme(theme);
          themeDropdown.classList.add('hidden');
        });
      });
    }

    // 在右侧面板显示节点属性
    function showNodeProperties(node) {
      const editPanel = document.getElementById('edit-panel');
      
      if (!node) {
        editPanel.innerHTML = '<p class="text-gray-500 text-center py-8">选择一个节点开始编辑</p>';
        return;
      }
      
      // 生成属性展示面板（移除标题和编辑按钮）
      let panelHTML = `
        <div class="bg-white rounded-lg shadow-md p-4">
      `;
      
      // 添加描述
      if (node.definition || node.description) {
        panelHTML += `
          <div class="mb-6">
            <h4 class="font-medium text-gray-700 mb-2 pb-1 border-b border-gray-200">描述</h4>
            <p class="text-sm text-gray-600">${node.definition || node.description}</p>
          </div>
        `;
      }
      
      // 添加其他属性
      Object.entries(node).forEach(([key, value]) => {
        // 跳过描述字段和基本信息
        if (key === 'definition' || key === 'description' || key === 'name' || key === 'id') {
          return;
        }
        
        // 跳过子节点数组（如subcategories, schemes等）
        if (Array.isArray(value) && (key === 'subcategories' || key === 'schemes' || key === 'sub_schemes' || key === 'methods' || key === 'techniques')) {
          return;
        }
        
        if (value !== null && value !== undefined) {
          // 对于数组类型的属性（如risk_characteristics, business_data_domains）
          if (Array.isArray(value) && value.length > 0) {
            panelHTML += `
              <div class="mb-6">
                <h4 class="font-medium text-gray-700 mb-2 pb-1 border-b border-gray-200">${formatKey(key)}</h4>
                <ul class="text-sm text-gray-600 list-disc list-inside space-y-1 pl-2">
            `;
            value.forEach(item => {
              panelHTML += `
                <li>${item}</li>
              `;
            });
            panelHTML += `
                </ul>
              </div>
            `;
          } else if (!Array.isArray(value)) {
            // 对于非数组类型的属性
            panelHTML += `
              <div class="mb-3">
                <div class="flex items-center">
                  <span class="text-sm font-medium text-gray-700 w-24">${formatKey(key)}:</span>
                  <span class="text-sm text-gray-600">${value}</span>
                </div>
              </div>
            `;
          }
        }
      });
      
      panelHTML += `
        </div>
      `;
      
      editPanel.innerHTML = panelHTML;
      
      // 隐藏编辑面板标题和添加新属性面板
      const editPanelTitle = document.getElementById('edit-panel-title');
      const addPropertyPanelContainer = document.getElementById('add-property-panel-container');
      
      if (editPanelTitle) {
        editPanelTitle.style.display = 'none';
      }
      
      if (addPropertyPanelContainer) {
        addPropertyPanelContainer.style.display = 'none';
      }
      
      // 清空添加属性面板内容
      const addPropertyPanel = document.getElementById('add-property-panel');
      addPropertyPanel.innerHTML = '';
    }

    // 版本控制功能
    
    // 加载版本历史
    function loadVersionHistory() {
      try {
        const storedHistory = localStorage.getItem('fraudTreeVersions');
        if (storedHistory) {
          versionHistory = JSON.parse(storedHistory);
        }
      } catch (error) {
        console.error('加载版本历史失败:', error);
        versionHistory = [];
      }
    }
    
    // 保存版本历史
    function saveVersionHistory() {
      try {
        localStorage.setItem('fraudTreeVersions', JSON.stringify(versionHistory));
      } catch (error) {
        console.error('保存版本历史失败:', error);
      }
    }
    
    // 创建初始版本
    function createInitialVersion() {
      const initialVersion = {
        id: Date.now(),
        name: '初始版本',
        description: 'Fraud Tree 初始数据',
        timestamp: new Date().toISOString(),
        data: JSON.parse(JSON.stringify(fraudTreeData))
      };
      
      versionHistory.push(initialVersion);
      saveVersionHistory();
    }
    
    // 创建新版本
    function createVersion() {
      const form = document.getElementById('create-version-form');
      const formData = new FormData(form);
      
      const versionName = formData.get('version-name');
      const versionDescription = formData.get('version-description');
      
      const newVersion = {
        id: Date.now(),
        name: versionName,
        description: versionDescription || '',
        timestamp: new Date().toISOString(),
        data: JSON.parse(JSON.stringify(fraudTreeData))
      };
      
      versionHistory.push(newVersion);
      saveVersionHistory();
      
      // 关闭模态框
      document.getElementById('create-version-modal').classList.add('hidden');
      
      // 重置表单
      form.reset();
      
      // 显示成功消息
      showMessage('新版本已创建', 'success');
    }
    
    // 显示版本历史
    function showVersionHistory() {
      const versionList = document.getElementById('version-list');
      versionList.innerHTML = '';
      
      // 按时间倒序排列版本
      const sortedVersions = [...versionHistory].sort((a, b) => b.timestamp.localeCompare(a.timestamp));
      
      sortedVersions.forEach(version => {
        const versionItem = document.createElement('div');
        versionItem.className = 'bg-gray-50 rounded-lg p-4 border border-gray-200';
        
        const date = new Date(version.timestamp).toLocaleString();
        
        versionItem.innerHTML = `
          <div class="flex justify-between items-start mb-2">
            <h4 class="font-medium text-gray-900">${version.name}</h4>
            <span class="text-xs text-gray-500">${date}</span>
          </div>
          ${version.description ? `<p class="text-sm text-gray-600 mb-3">${version.description}</p>` : ''}
          <div class="flex gap-2 justify-end">
            <button class="btn btn-outline btn-sm restore-version" data-version-id="${version.id}">
              <i class="fa fa-check mr-1"></i> 恢复
            </button>
            <button class="btn btn-danger btn-sm delete-version" data-version-id="${version.id}">
              <i class="fa fa-trash mr-1"></i> 删除
            </button>
          </div>
        `;
        
        versionList.appendChild(versionItem);
      });
      
      // 绑定恢复和删除按钮事件
      document.querySelectorAll('.restore-version').forEach(btn => {
        btn.addEventListener('click', function() {
          const versionId = parseInt(this.getAttribute('data-version-id'));
          restoreVersion(versionId);
        });
      });
      
      document.querySelectorAll('.delete-version').forEach(btn => {
        btn.addEventListener('click', function() {
          const versionId = parseInt(this.getAttribute('data-version-id'));
          deleteVersion(versionId);
        });
      });
      
      // 显示模态框
      document.getElementById('version-history-modal').classList.remove('hidden');
    }
    
    // 恢复版本
    function restoreVersion(versionId) {
      const version = versionHistory.find(v => v.id === versionId);
      if (version) {
        fraudTreeData = JSON.parse(JSON.stringify(version.data));
        renderTree();
        
        // 关闭模态框
        document.getElementById('version-history-modal').classList.add('hidden');
        
        // 显示成功消息
        showMessage(`已恢复到版本: ${version.name}`, 'success');
      }
    }
    
    // 删除版本
    function deleteVersion(versionId) {
      if (versionHistory.length <= 1) {
        showMessage('至少需要保留一个版本', 'error');
        return;
      }
      
      versionHistory = versionHistory.filter(v => v.id !== versionId);
      saveVersionHistory();
      
      // 重新显示版本历史
      showVersionHistory();
      
      // 显示成功消息
      showMessage('版本已删除', 'success');
    }

    // 标签管理功能
    
    // 加载标签
    function loadTags() {
      try {
        const storedTags = localStorage.getItem('fraudTreeTags');
        if (storedTags) {
          tags = JSON.parse(storedTags);
        }
      } catch (error) {
        console.error('加载标签失败:', error);
        tags = [];
      }
    }
    
    // 保存标签
    function saveTags() {
      try {
        localStorage.setItem('fraudTreeTags', JSON.stringify(tags));
      } catch (error) {
        console.error('保存标签失败:', error);
      }
    }
    
    // 显示标签管理界面
    function showTagsManagement() {
      const tagsList = document.getElementById('tags-list');
      tagsList.innerHTML = '';
      
      if (tags.length === 0) {
        tagsList.innerHTML = '<p class="text-gray-500 text-center py-4">暂无标签</p>';
      } else {
        tags.forEach(tag => {
          const tagItem = document.createElement('div');
          tagItem.className = 'flex items-center justify-between p-3 bg-gray-50 rounded-lg border border-gray-200';
          
          tagItem.innerHTML = `
            <div class="flex items-center gap-3">
              <div class="w-6 h-6 rounded-full" style="background-color: ${tag.color}"></div>
              <span class="font-medium">${tag.name}</span>
            </div>
            <div class="flex gap-2">
              <button class="btn btn-outline btn-sm edit-tag" data-tag-id="${tag.id}">
                <i class="fa fa-pencil mr-1"></i> 编辑
              </button>
              <button class="btn btn-danger btn-sm delete-tag" data-tag-id="${tag.id}">
                <i class="fa fa-trash mr-1"></i> 删除
              </button>
            </div>
          `;
          
          tagsList.appendChild(tagItem);
        });
        
        // 绑定编辑和删除按钮事件
        document.querySelectorAll('.edit-tag').forEach(btn => {
          btn.addEventListener('click', function() {
            const tagId = parseInt(this.getAttribute('data-tag-id'));
            editTag(tagId);
          });
        });
        
        document.querySelectorAll('.delete-tag').forEach(btn => {
          btn.addEventListener('click', function() {
            const tagId = parseInt(this.getAttribute('data-tag-id'));
            deleteTag(tagId);
          });
        });
      }
      
      // 显示模态框
      document.getElementById('tags-modal').classList.remove('hidden');
    }
    
    // 添加标签
    function addTag() {
      const form = document.getElementById('add-tag-form');
      const formData = new FormData(form);
      
      const tagName = formData.get('tag-name').trim();
      const tagColor = formData.get('tag-color');
      
      if (!tagName) {
        showMessage('标签名称不能为空', 'error');
        return;
      }
      
      // 检查标签是否已存在
      if (tags.some(tag => tag.name === tagName)) {
        showMessage('标签已存在', 'error');
        return;
      }
      
      const newTag = {
        id: Date.now(),
        name: tagName,
        color: tagColor
      };
      
      tags.push(newTag);
      saveTags();
      
      // 重置表单
      form.reset();
      document.getElementById('tag-color').value = '#3b82f6';
      
      // 重新显示标签管理界面
      showTagsManagement();
      
      // 显示成功消息
      showMessage('标签已添加', 'success');
    }
    
    // 编辑标签
    function editTag(tagId) {
      const tag = tags.find(t => t.id === tagId);
      if (!tag) return;
      
      const newName = prompt('输入新的标签名称:', tag.name);
      if (newName === null) return;
      
      const trimmedName = newName.trim();
      if (!trimmedName) {
        showMessage('标签名称不能为空', 'error');
        return;
      }
      
      // 检查标签是否已存在
      if (tags.some(t => t.name === trimmedName && t.id !== tagId)) {
        showMessage('标签已存在', 'error');
        return;
      }
      
      const newColor = prompt('输入新的标签颜色 (十六进制):', tag.color);
      if (newColor === null) return;
      
      // 验证颜色格式
      const colorRegex = /^#[0-9A-Fa-f]{6}$/;
      if (!colorRegex.test(newColor)) {
        showMessage('无效的颜色格式，请使用十六进制颜色代码', 'error');
        return;
      }
      
      tag.name = trimmedName;
      tag.color = newColor;
      saveTags();
      
      // 重新显示标签管理界面
      showTagsManagement();
      
      // 显示成功消息
      showMessage('标签已更新', 'success');
    }
    
    // 删除标签
    function deleteTag(tagId) {
      if (confirm('确定要删除这个标签吗？')) {
        tags = tags.filter(tag => tag.id !== tagId);
        saveTags();
        
        // 重新显示标签管理界面
        showTagsManagement();
        
        // 显示成功消息
        showMessage('标签已删除', 'success');
      }
    }

    // 主题管理功能
    
    // 加载主题
    function loadTheme() {
      try {
        const storedTheme = localStorage.getItem('fraudTreeTheme');
        if (storedTheme) {
          currentTheme = storedTheme;
        } else {
          // 默认为系统主题
          currentTheme = 'system';
        }
      } catch (error) {
        console.error('加载主题失败:', error);
        currentTheme = 'light';
      }
    }
    
    // 保存主题
    function saveTheme() {
      try {
        localStorage.setItem('fraudTreeTheme', currentTheme);
      } catch (error) {
        console.error('保存主题失败:', error);
      }
    }
    
    // 设置主题
    function setTheme(theme) {
      currentTheme = theme;
      saveTheme();
      applyTheme();
      
      // 显示成功消息
      let themeName = '';
      switch (theme) {
        case 'light':
          themeName = '浅色主题';
          break;
        case 'dark':
          themeName = '深色主题';
          break;
        case 'system':
          themeName = '系统主题';
          break;
      }
      showMessage(`已切换到 ${themeName}`, 'success');
    }
    
    // 应用主题
    function applyTheme() {
      let themeToApply = currentTheme;
      
      // 如果是系统主题，检测系统偏好
      if (currentTheme === 'system') {
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          themeToApply = 'dark';
        } else {
          themeToApply = 'light';
        }
      }
      
      // 移除现有的主题类
      document.documentElement.classList.remove('dark');
      
      // 应用新主题
      if (themeToApply === 'dark') {
        document.documentElement.classList.add('dark');
        document.getElementById('theme-toggle').innerHTML = '<i class="fa fa-sun-o mr-2"></i> 主题';
      } else {
        document.getElementById('theme-toggle').innerHTML = '<i class="fa fa-moon-o mr-2"></i> 主题';
      }
      
      // 更新主题下拉菜单的样式
      const themeDropdown = document.getElementById('theme-dropdown');
      if (themeToApply === 'dark') {
        themeDropdown.classList.add('bg-gray-800', 'text-white');
        themeDropdown.classList.remove('bg-white', 'text-gray-700');
        
        const themeOptions = themeDropdown.querySelectorAll('.theme-option');
        themeOptions.forEach(option => {
          option.classList.add('text-gray-200', 'hover:bg-gray-700');
          option.classList.remove('text-gray-700', 'hover:bg-gray-100');
        });
      } else {
        themeDropdown.classList.add('bg-white', 'text-gray-700');
        themeDropdown.classList.remove('bg-gray-800', 'text-white');
        
        const themeOptions = themeDropdown.querySelectorAll('.theme-option');
        themeOptions.forEach(option => {
          option.classList.add('text-gray-700', 'hover:bg-gray-100');
          option.classList.remove('text-gray-200', 'hover:bg-gray-700');
        });
      }
    }
    
    // 监听系统主题变化
    if (window.matchMedia) {
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        if (currentTheme === 'system') {
          applyTheme();
        }
      });
    }

    // 初始化应用
    init();
  </script>
</body>
</html>
